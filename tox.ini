[tox]
env_list =
    py310
    py311
    py312
    py313
    lint
    type
    build
    smoke
isolated_build = true
skip_missing_interpreters = true

[testenv]
description = Run the unit test suite on {base_python}
set_env =
    PYTHONPATH = {toxinidir}/src
commands =
    python -m unittest discover -s tests -v

[testenv:lint]
description = Run Ruff lint and format checks
skip_install = true
deps =
    ruff>=0.8
commands =
    python -m ruff check src tests
    python -m ruff format --check src tests

[testenv:type]
description = Run mypy static type checks
extras = dev
set_env =
    PYTHONPATH = {toxinidir}/src
commands =
    python -m mypy

[testenv:build]
description = Build source and wheel distributions, then verify package metadata
skip_install = true
deps =
    build>=1.2
    twine>=5.1
commands =
    python -m build --sdist --wheel --outdir {envtmpdir}/dist
    python -c "from pathlib import Path; import subprocess, sys; files = [str(path) for path in sorted((Path(r'{envtmpdir}') / 'dist').iterdir())]; raise SystemExit(subprocess.call([sys.executable, '-m', 'twine', 'check', *files]))"

[testenv:smoke]
description = Run standard-library smoke checks
set_env =
    PYTHONPATH = {toxinidir}/src
allowlist_externals =
    make
commands =
    make smoke

[testenv:smoke-pdf]
description = Run PDF smoke checks with optional PDF dependencies
extras = pdf
set_env =
    PYTHONPATH = {toxinidir}/src
allowlist_externals =
    make
commands =
    make smoke-pdf

[testenv:smoke-jpeg]
description = Run JPEG smoke checks with optional JPEG dependencies
extras = jpeg
set_env =
    PYTHONPATH = {toxinidir}/src
allowlist_externals =
    make
commands =
    make smoke-jpeg

[testenv:smoke-m4a]
description = Run M4A-to-MP3 smoke checks with system FFmpeg
set_env =
    PYTHONPATH = {toxinidir}/src
allowlist_externals =
    make
    ffmpeg
commands =
    make smoke-m4a
